name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

env:
  DATABASE_URL: mysql://app:devpassword@localhost:3306/fieldserviceit-test
  JWT_SECRET: ci-secret-key-for-testing-only
  JWT_EXPIRES_IN: 15m
  SMTP_HOST: localhost
  SMTP_PORT: 1025
  FRONTEND_URL: http://localhost:3000
  STORAGE_TYPE: local
  CORS_ORIGIN: http://localhost:3000
  NODE_ENV: test

jobs:
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit -p tsconfig.build.json

  backend-unit:
    name: Backend Unit Tests
    needs: backend-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: fieldserviceit-test
          MYSQL_USER: app
          MYSQL_PASSWORD: devpassword
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -prootpassword"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run prisma:seed
      - run: npm test

  backend-e2e:
    name: Backend E2E Tests
    needs: backend-unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: fieldserviceit-test
          MYSQL_USER: app
          MYSQL_PASSWORD: devpassword
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -prootpassword"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run prisma:seed
      - run: npm run test:e2e -- --testPathPattern="app.e2e-spec|auth-ticket-lifecycle.e2e-spec|permissions.e2e-spec"

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm run lint

  security-check:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm audit --production --audit-level=high
        continue-on-error: true

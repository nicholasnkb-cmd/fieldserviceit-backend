name: Backend validation

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master", "deploy/**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: mysql://test:test@127.0.0.1:3306/test
      JWT_SECRET: test-jwt-secret-with-at-least-thirty-two-characters
      JWT_REFRESH_SECRET: test-refresh-secret-with-at-least-thirty-two-characters
      CREDENTIAL_ENCRYPTION_KEY: test-encryption-key-with-at-least-thirty-two-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx eslint "{src,apps,libs}/**/*.ts"
      - run: npm run check:permissions
      - run: npm run check:tenant-sql
      - run: npm test -- --runInBand
      - run: npm run build
      - run: npm audit --audit-level=critical

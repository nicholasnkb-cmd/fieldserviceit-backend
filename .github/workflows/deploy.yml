name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy-backend:
    name: Deploy Backend to hPanel
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add backend remote
        run: |
          git remote add backend-origin https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/nicholasnkb-cmd/fieldserviceit-backend.git || true

      - name: Push backend subtree
        run: |
          git subtree push --prefix=backend backend-origin master

      - name: Trigger hPanel redeploy
        run: |
          echo "Backend pushed to GitHub. Trigger hPanel redeploy manually or via API."
          echo "API endpoint: POST https://developers.hostinger.com/api/hosting/v1/nodejs/redeploy"
        if: success()

  deploy-frontend:
    name: Deploy Frontend to hPanel
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add frontend remote
        run: |
          git remote add frontend-origin https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/nicholasnkb-cmd/fieldserviceit-frontend.git || true

      - name: Push frontend subtree
        run: |
          git subtree push --prefix=frontend frontend-origin master

      - name: Trigger hPanel redeploy
        run: |
          echo "Frontend pushed to GitHub. Trigger hPanel redeploy manually or via API."
        if: success()

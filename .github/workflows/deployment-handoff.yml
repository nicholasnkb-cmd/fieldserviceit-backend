name: Deployment handoff and rollback

on:
  push:
    branches: ["deploy/**"]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: backend-production-handoff
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      NODE_ENV: test
      DATABASE_URL: mysql://test:test@127.0.0.1:3306/test
      JWT_SECRET: test-jwt-secret-with-at-least-thirty-two-characters
      JWT_REFRESH_SECRET: test-refresh-secret-with-at-least-thirty-two-characters
      CREDENTIAL_ENCRYPTION_KEY: test-encryption-key-with-at-least-thirty-two-characters
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx eslint "{src,apps,libs}/**/*.ts"
      - run: npm run check:permissions
      - run: npm run check:tenant-sql
      - run: npm test -- --runInBand
      - run: npm run build
      - name: Publish protected deployment PR
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          release=$(jq -r .commit release.json)
          pr_url=$(gh pr create --base master --head "$GITHUB_REF_NAME" --title "Deploy backend ${release:0:12}" --body "Validated automated deployment of monorepo release $release.")
          pr_number="${pr_url##*/}"
          for attempt in {1..60}; do
            state=$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/check-runs" --jq '[.check_runs[] | select(.name == "validate")][0] | .conclusion // .status // ""')
            if [ "$state" = "success" ]; then
              break
            fi
            if [ "$state" = "failure" ] || [ "$state" = "cancelled" ] || [ "$state" = "timed_out" ]; then
              echo "Required validate check failed: $state" >&2
              exit 1
            fi
            if [ "$attempt" = "60" ]; then
              echo "Required validate check did not complete in time" >&2
              exit 1
            fi
            sleep 10
          done
          gh pr merge "$pr_number" --squash --delete-branch
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
      - name: Verify protected deployment publication
        shell: bash
        env:
          RELEASE: ${{ steps.publish.outputs.release }}
        run: |
          set -euo pipefail
          deployed=$(gh api "repos/$GITHUB_REPOSITORY/contents/release.json?ref=master" --jq .content | base64 -d | jq -r .commit)
          if [ "$deployed" != "$RELEASE" ]; then
            echo "Protected master contains $deployed, expected $RELEASE" >&2
            exit 1
          fi
          echo "Backend release $RELEASE is published to protected master. The monorepo production orchestrator will wait for the Hostinger build, restart Node.js, and verify the live SHA."

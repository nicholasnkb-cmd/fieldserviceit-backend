name: Deployment handoff and rollback

on:
  push:
    branches: ["deploy/**"]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: backend-production-handoff
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      NODE_ENV: test
      DATABASE_URL: mysql://test:test@127.0.0.1:3306/test
      JWT_SECRET: test-jwt-secret-with-at-least-thirty-two-characters
      JWT_REFRESH_SECRET: test-refresh-secret-with-at-least-thirty-two-characters
      CREDENTIAL_ENCRYPTION_KEY: test-encryption-key-with-at-least-thirty-two-characters
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx eslint "{src,apps,libs}/**/*.ts"
      - run: npm run check:permissions
      - run: npm run check:tenant-sql
      - run: npm test -- --runInBand
      - run: npm run build
      - name: Publish protected deployment PR
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          release=$(jq -r .commit release.json)
          pr_url=$(gh pr create --base master --head "$GITHUB_REF_NAME" --title "Deploy backend ${release:0:12}" --body "Validated automated deployment of monorepo release $release.")
          pr_number="${pr_url##*/}"
          for attempt in {1..60}; do
            state=$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/check-runs" --jq '[.check_runs[] | select(.name == "validate")][0] | .conclusion // .status // ""')
            if [ "$state" = "success" ]; then
              break
            fi
            if [ "$state" = "failure" ] || [ "$state" = "cancelled" ] || [ "$state" = "timed_out" ]; then
              echo "Required validate check failed: $state" >&2
              exit 1
            fi
            if [ "$attempt" = "60" ]; then
              echo "Required validate check did not complete in time" >&2
              exit 1
            fi
            sleep 10
          done
          gh pr merge "$pr_number" --squash --delete-branch
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
      - name: Verify Hostinger deployment and roll back on failure
        shell: bash
        env:
          RELEASE: ${{ steps.publish.outputs.release }}
        run: |
          set -uo pipefail
          for attempt in {1..60}; do
            live=$(curl -fsS --max-time 20 https://api.fieldserviceit.com/v1/health/live | jq -r .commit 2>/dev/null || true)
            if [ "$live" = "$RELEASE" ]; then
              echo "Backend release $RELEASE is live."
              exit 0
            fi
            sleep 10
          done
          echo "Backend release $RELEASE did not become healthy; creating rollback." >&2
          git fetch origin master
          failed_commit=$(git rev-parse origin/master)
          rollback_branch="rollback/backend-${GITHUB_RUN_ID}"
          git config user.name "FieldServiceIT Deploy Bot"
          git config user.email "deploy-bot@fieldserviceit.com"
          git checkout -b "$rollback_branch" origin/master
          git revert --no-edit "$failed_commit"
          git push --set-upstream origin "$rollback_branch"
          rollback_url=$(gh pr create --base master --head "$rollback_branch" --title "Rollback failed backend release ${RELEASE:0:12}" --body "Automatic rollback because the Hostinger health check did not report release $RELEASE within 10 minutes.")
          gh pr merge "${rollback_url##*/}" --squash --delete-branch
          exit 1
